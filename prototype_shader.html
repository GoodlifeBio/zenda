<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shader Prototype</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
        canvas { width: 100%; height: 100%; display: block; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);

        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

        // Bayer 8x8 Matrix
        const bayerMatrix = [
            0, 32, 8, 40, 2, 34, 10, 42,
            48, 16, 56, 24, 50, 18, 58, 26,
            12, 44, 4, 36, 14, 46, 6, 38,
            60, 28, 52, 20, 62, 30, 54, 22,
            3, 35, 11, 43, 1, 33, 9, 41,
            51, 19, 59, 27, 49, 17, 57, 25,
            15, 47, 7, 39, 13, 45, 5, 37,
            63, 31, 55, 23, 61, 29, 53, 21
        ].map(v => v / 64);

        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform float u_time;
            uniform vec2 u_resolution;
            uniform float u_pixelRatio;
            uniform float u_bayer[64];
            varying vec2 vUv;

            float getBayer(vec2 p) {
                int x = int(mod(p.x, 8.0));
                int y = int(mod(p.y, 8.0));
                return u_bayer[y * 8 + x];
            }

            void main() {
                vec2 st = gl_FragCoord.xy / u_resolution.xy;
                vec2 pixel_coord = gl_FragCoord.xy; // * u_pixelRatio;

                float t = u_time * 0.3;
                vec2 shape_uv = (vUv * 2.0 - 1.0);
                shape_uv.x *= u_resolution.x / u_resolution.y;

                shape_uv *= 3.0; // zoom
                
                // Simulating wave
                float wave = cos(0.6 * shape_uv.x - 2.5 * t) * sin(1.2 * shape_uv.x + t) * (0.8 + 0.2 * cos(2.0 * t));
                float shape = 1.0 - smoothstep(-0.5, 0.5, shape_uv.y + wave);

                // Dithering
                float dotSize = 8.0; // scale
                float b = getBayer(pixel_coord / dotSize);
                float res = step(0.5, shape + (b - 0.5));

                if (res < 0.5) {
                    discard;
                }

                gl_FragColor = vec4(1.0, 1.0, 1.0, 0.4);
            }
        `;

        const material = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            uniforms: {
                u_time: { value: 0 },
                u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                u_pixelRatio: { value: window.devicePixelRatio },
                u_bayer: { value: bayerMatrix }
            },
            transparent: true,
            depthWrite: false,
            depthTest: false
        });

        const geometry = new THREE.PlaneGeometry(2, 2);
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        function animate(time) {
            material.uniforms.u_time.value = time * 0.001;
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            renderer.setSize(width, height);
            material.uniforms.u_resolution.value.set(width, height);
        });

        requestAnimationFrame(animate);
    </script>
</body>
</html>
